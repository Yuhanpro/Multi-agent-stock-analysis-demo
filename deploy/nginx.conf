# stock-web nginx site.
# Listens on :18080 to avoid OpenClaw's historical :8080 and avoid unfiled
# 80/443 ports. Once ICP + HTTPS are ready, switch to 443.
#
# Serves the static Next export from /var/www/stock-web and reverse-proxies
# /api/* to the FastAPI backend on loopback :8000. Tuned for SSE long
# connections (debate runs ~5 min).

upstream stock_web_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

# Security response headers. Kept as a variable-free block we physically repeat
# in every location, because nginx's add_header inheritance is REPLACE-not-merge:
# the moment a location declares any add_header, it stops inheriting the ones set
# in the parent (server) scope. So a single server-level block would silently
# vanish inside /, /_next/static/ and /api/ (all of which set their own headers).
#
# HSTS is intentionally omitted while we're on plain HTTP :18080 — sending it
# over HTTP is meaningless and, once served over HTTPS, would pin browsers to
# https for this host. Add it in Stage B together with the 443 listener.
#
# CSP allows 'unsafe-inline' because Next's static export injects an inline
# bootstrap script + inline styles; everything else is same-origin. If a future
# feature loads a third-party resource, widen the matching directive.

server {
    listen 18080 default_server;
    server_name _;

    root /var/www/stock-web;
    index index.html;

    # Hash-stamped JS/CSS get long cache; HTML doesn't (so deploys land instantly)
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
        try_files $uri =404;
    }

    location / {
        # HTML entry points must not be cached; Next's hashed JS/CSS under
        # /_next/static/ are cached for 1y above. Without this, browsers may
        # keep an old index.html and not pick up a new deploy.
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
        try_files $uri $uri/ $uri.html /index.html;
    }

    # API + SSE
    # ---------
    # SSE survival on this proxy hop:
    #   - proxy_buffering off       → never collect chunks before flushing
    #   - proxy_cache off           → don't cache event-stream
    #   - chunked_transfer_encoding on
    #   - long timeouts             → debate runs ~5 min; default 60s would cut it
    #   - X-Accel-Buffering no      → reinforces "don't buffer" for any
    #                                 cloud LB that may add another nginx hop
    location /api/ {
        proxy_pass http://stock_web_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;
        chunked_transfer_encoding on;
        add_header X-Accel-Buffering no always;
        # API is JSON/SSE, never a document — nosniff + no-framing is enough;
        # CSP on non-HTML responses would be inert, so we skip it here.
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;

        # 10-min ceilings.
        proxy_connect_timeout 30s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    location = /healthz {
        proxy_pass http://stock_web_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Don't expose hidden files (.htaccess/.htpasswd, .env, .git/*)
    location ~ /\.(ht|env|git) {
        deny all;
        return 404;
    }
}

# ============================================================================
# Stage B — HTTPS (uncomment after ICP filing clears and DNS points here).
#
# IMPORTANT: obtain the cert with `certbot certonly` (NOT `certbot --nginx`).
# install.sh overwrites the deployed nginx config from THIS file on every run,
# so any edits certbot makes in-place to /etc/nginx would be wiped on the next
# deploy. Keeping the 443 block here means HTTPS survives redeploys.
#
#   sudo apt install -y certbot
#   sudo certbot certonly --webroot -w /var/www/stock-web -d your.domain
#   # then uncomment below, replace your.domain, and:  sudo bash deploy/install.sh
#
# Remember: also set PUBLIC_API_BASE=https://your.domain in .env and redeploy,
# because NEXT_PUBLIC_API_BASE is baked into the frontend at build time.
# ============================================================================
